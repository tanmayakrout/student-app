version: 0.2

env:
  variables:
    APP_NAME: "student-app"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip3 install --upgrade pip
      - pip3 install -r requirements.txt    
  build:
    commands:
      - echo "Build phase started..."
      - echo "Nothing to compile for Flask app"
      - python -m py_compile app.py

  post_build:
    commands:
      - echo "Preparing deployment artifacts..."
      - echo "Validating deployment files..."
      - test -f appspec.yml
      - echo "Listing artifact contents..."
      - ls -R

artifacts:
  files:
    - app.py
    - requirements.txt
    - appspec.yml
    - scripts/install.sh
    - scripts/start.sh
    - scripts/cleanup.sh
    - scripts/healthcheck.sh
    - config/**/*
  discard-paths: no