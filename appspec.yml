version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/student-app
    overwrite: true

permissions:
  - object: /home/ec2-user/student-app
    pattern: "**"
    owner: ec2-user
    group: ec2-user

hooks:
  BeforeInstall:
    - location: scripts/cleanup.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/install.sh
      timeout: 300
      runas: ec2-user

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300
      runas: ec2-user

  ValidateService:
    - location: scripts/healthcheck.sh
      timeout: 300
      runas: ec2-user